name: Create Tracked Issues

on:
  push:
    branches:
      - "copilot/add-draught-rate-of-turn-beam-fields"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    name: Create non-blocking issues from PR 19
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Issue A - Enhancement draught/rate_of_turn/beam
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh issue list --repo "$REPO" \
            --search "Enhancement: add draught, rate_of_turn, beam fields to VesselData" \
            --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            echo "Issue A already exists (#$existing), skipping."
          else
            gh issue create \
              --repo "$REPO" \
              --title "Enhancement: add draught, rate_of_turn, beam fields to VesselData" \
              --label "enhancement" \
              --body-file ".github/ISSUE_BODIES/issue-a.md"
          fi

      - name: Create Issue B - VesselData immutable docstring bug
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh issue list --repo "$REPO" \
            --search "VesselData Immutable docstring vs mutable last_seen mutation" \
            --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            echo "Issue B already exists (#$existing), skipping."
          else
            gh issue create \
              --repo "$REPO" \
              --title 'Bug: VesselData "Immutable" docstring vs mutable last_seen mutation' \
              --label "bug" \
              --body-file ".github/ISSUE_BODIES/issue-b.md"
          fi

      - name: Create Issue C - Verify _parse_response field names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh issue list --repo "$REPO" \
            --search "confirm _parse_response field names against live MarineTraffic data" \
            --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            echo "Issue C already exists (#$existing), skipping."
          else
            gh issue create \
              --repo "$REPO" \
              --title "Verification: confirm _parse_response field names against live MarineTraffic data" \
              --body-file ".github/ISSUE_BODIES/issue-c.md"
          fi
